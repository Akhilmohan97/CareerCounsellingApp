name: Build macOS

on:
  workflow_dispatch

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore CareerCounsellingApp/CareerCounsellingApp.csproj

      - name: Publish macOS ARM64
        run: |
          dotnet publish CareerCounsellingApp/CareerCounsellingApp.csproj \
            -c Release \
            -r osx-arm64 \
            --self-contained true

      - name: Install Velopack
        run: dotnet tool install -g vpk

      - name: Add .NET Tools to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Verify Publish Output
        run: |
          ls -la CareerCounsellingApp/bin/Release/net8.0/osx-arm64/publish

      - name: Package with Velopack
        run: |
          vpk pack \
            --packId CareerCounsellingApp \
            --packVersion 2.0.1 \
            --packAuthors "Akhil Mohan" \
            --packTitle "Career Counselling App" \
            --mainExe CareerCounsellingApp \
            --packDir "CareerCounsellingApp/bin/Release/net8.0/osx-arm64/publish"

      - name: Upload Velopack Package
        uses: actions/upload-artifact@v4
        with:
          name: macos-velopack
          path: Releases/**
